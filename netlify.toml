# RED-K MOTORS - Netlify
# Pour migration depuis GitHub Pages : redirections 301 vers URLs canoniques

[build]
  command = "npm run build"
  publish = "_site"

# Redirections 301 : .html -> slash trailing
[[redirects]]
  from = "/mecanique.html"
  to = "/mecanique/"
  status = 301
  force = true

[[redirects]]
  from = "/carrosserie.html"
  to = "/carrosserie/"
  status = 301
  force = true

